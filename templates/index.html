<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>增值税发票 OCR</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    .hint { color: #666; font-size: 0.9rem; line-height: 1.6; }
    .file-label { display: block; margin-bottom: 8px; font-weight: 600; }
    .file-hint { margin: 8px 0 0; }
    form { margin-top: 24px; }
    button { margin-top: 12px; padding: 8px 16px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 12px; overflow: auto; white-space: pre-wrap; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <h1>增值税发票 OCR 识别</h1>
  <p class="hint">
    接口地址：<code>POST /invoice-ocr</code>，参数名 <code>file</code>。<br>
    支持格式：<strong>jpg、jpeg、png、pdf</strong>；PDF 将自动转换并识别<strong>第一页</strong>。<br>
    也可使用 Postman 调用。
  </p>
  <form id="uploadForm">
    <label for="file" class="file-label">选择发票文件（jpg / png / pdf）</label>
    <input type="file" id="file" name="file" accept=".pdf,application/pdf,.jpg,.jpeg,.png,image/jpeg,image/png" required>
    <p class="hint file-hint" id="fileHint">未选择文件</p>
    <br>
    <button type="submit">上传识别</button>
  </form>
  <p id="status"></p>
  <pre id="result"></pre>
  <script>
    var fileInput = document.getElementById('file');
    var fileHint = document.getElementById('fileHint');

    fileInput.addEventListener('change', function () {
      if (!fileInput.files.length) {
        fileHint.textContent = '未选择文件';
        return;
      }
      var f = fileInput.files[0];
      var ext = f.name.split('.').pop().toLowerCase();
      if (ext === 'pdf') {
        fileHint.textContent = '已选择 PDF：' + f.name + '（将识别第一页）';
      } else {
        fileHint.textContent = '已选择图片：' + f.name;
      }
    });

    document.getElementById('uploadForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      var status = document.getElementById('status');
      var result = document.getElementById('result');
      var fileInput = document.getElementById('file');
      if (!fileInput.files.length) return;

      var ext = fileInput.files[0].name.split('.').pop().toLowerCase();
      status.textContent = ext === 'pdf' ? 'PDF 转换并识别中…' : '识别中…';
      status.className = '';
      result.textContent = '';

      var formData = new FormData();
      formData.append('file', fileInput.files[0]);

      try {
        var resp = await fetch('/invoice-ocr', { method: 'POST', body: formData });
        var data = await resp.json();
        status.textContent = resp.ok ? '请求完成' : '请求失败 (' + resp.status + ')';
        if (!resp.ok) status.className = 'error';
        result.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        status.textContent = '请求失败：' + err.message;
        status.className = 'error';
      }
    });
  </script>
</body>
</html>
